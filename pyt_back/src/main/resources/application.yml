spring:
  application:
    name: pyt_back

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
      
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
